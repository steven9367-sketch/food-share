<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智取食光｜AI 剩食自動攔截平台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(135deg, #0d1512 0%, #040706 100%);
            color: #e0e7e5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(74, 222, 128, 0.08);
            border-radius: 28px;
            width: 100%;
            max-width: 460px;
            padding: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #4ade80, #2dd4bf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .subtitle { font-size: 13px; color: #788b86; margin-bottom: 15px; }

        .tab-menu {
            display: flex; background: rgba(0, 0, 0, 0.4); padding: 4px; border-radius: 14px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .tab-btn {
            flex: 1; padding: 11px; font-size: 14px; background: none; border: none; color: #788b86;
            cursor: pointer; font-weight: 600; border-radius: 10px; transition: all 0.3s;
        }
        .tab-btn.active {
            background: linear-gradient(90deg, #4ade80, #2dd4bf); color: #050807;
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.25);
        }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        /* 鏡頭容器 */
        .camera-container {
            position: relative; width: 100%; aspect-ratio: 4 / 3; border-radius: 20px;
            overflow: hidden; background-color: #000000; border: 1px solid rgba(74, 222, 128, 0.2);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 智慧探測鎖定框 */
        .overlay-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 60%; border: 2px solid #2dd4bf;
            box-shadow: 0 0 0 9999px rgba(5, 8, 7, 0.6); pointer-events: none; border-radius: 16px;
            transition: all 0.3s ease;
        }
        
        /* 狀態色彩控制 */
        .camera-container.working .overlay-box { border-color: #4ade80; box-shadow: 0 0 15px #4ade80, 0 0 0 9999px rgba(5, 8, 7, 0.5); }
        .camera-container.cooldown .overlay-box { border-color: #6b7280; box-shadow: 0 0 0 9999px rgba(5, 8, 7, 0.75); }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, #4ade80, transparent);
            display: none; pointer-events: none;
        }
        .camera-container.working .scan-line {
            display: block; animation: scan 2s infinite linear;
        }

        /* 智能狀態面板 */
        .status-card {
            margin-top: 15px; background: rgba(0, 0, 0, 0.3); border-radius: 14px;
            padding: 14px; font-size: 13px; color: #a3b8b2; border-left: 4px solid #2dd4bf;
            text-align: left; line-height: 1.5;
        }
        .status-title { font-weight: bold; color: #2dd4bf; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .cooldown-timer { color: #f59e0b; font-weight: bold; }

        /* 看板端 */
        .food-list { display: flex; flex-direction: column; gap: 12px; max-height: 420px; overflow-y: auto; padding-right: 4px; }
        .food-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px; display: flex; padding: 14px; gap: 14px; align-items: center; text-align: left;
        }
        
        /* 實體照片縮圖樣式優化 */
        .food-thumb {
            width: 75px; height: 75px; border-radius: 12px; object-fit: cover;
            background: #141f1b; border: 1px solid rgba(74, 222, 128, 0.15);
        }
        
        .food-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .food-title { font-size: 16px; font-weight: 600; color: #ffffff; }
        .food-loc { font-size: 12px; color: #889994; }
        .badge-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
        .badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 600; }
        .badge-status { background: rgba(45, 212, 191, 0.12); color: #2dd4bf; border: 1px solid rgba(45, 212, 191, 0.2); }
        .badge-time { background: rgba(255, 255, 255, 0.04); color: #94a3b8; }
        
        .food-list::-webkit-scrollbar { width: 4px; }
        .food-list::-webkit-scrollbar-thumb { background: rgba(74, 222, 128, 0.15); border-radius: 4px; }

        /* 用於捕捉實體畫面特徵的隱藏 Canvas */
        #capture-canvas { display: none; }

        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-card">
        <h2>智取食光</h2>
        <div class="subtitle">SDG 12 永續校園：IoT 智能截流去化系統</div>
        
        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('upload-tab')">🤖 AI 自動偵測</button>
            <button class="tab-btn" onclick="switchTab('board-tab')" id="refresh-board-btn">📋 共享即時看板</button>
        </div>

        <div id="upload-tab" class="tab-content active">
            <div class="camera-container working" id="cam-container">
                <video id="webcam" autoplay playsinline muted></video>
                <div class="scan-line"></div>
                <div class="overlay-box"></div>
            </div>
            
            <div class="status-card">
                <div class="status-title">
                    <span>📡 系統核心面板</span>
                    <span class="cooldown-timer" id="cooldown-txt"></span>
                </div>
                <div id="status-text">📡 正在初始化智慧環境，請允許相機權限...</div>
            </div>
        </div>

        <div id="board-tab" class="tab-content">
            <div class="food-list" id="food-list-container">
                <p style="color: #889994; font-size: 14px; padding: 20px;">資料庫同步中...</p>
            </div>
        </div>
    </div>

    <canvas id="capture-canvas" width="160" height="120"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZWDL92iOl9i-bfAzxzjwhysTQ049Zhg",
            authDomain: "food-sharing-bank.firebaseapp.com",
            projectId: "food-sharing-bank",
            storageBucket: "food-sharing-bank.firebasestorage.app",
            messagingSenderId: "83109359198",
            appId: "1:83109359198:web:5b800603f43a1a1e2b8ecf",
            measurementId: "G-K56TP7PXDN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status-text');
        const cooldownTxt = document.getElementById('cooldown-txt');
        const camContainer = document.getElementById('cam-container');
        const foodListContainer = document.getElementById('food-list-container');
        
        const captureCanvas = document.getElementById('capture-canvas');
        const captureCtx = captureCanvas.getContext('2d');

        let isCoolingDown = false;
        let lastImageFingerprint = ""; // 用來記憶上一張成功上傳的照片特徵碼

        const mockFoodPool = [
            { name: "照燒雞腿便當", loc: "資管系辦公室外 MB401", fresh: "新鮮度 98% (優等)" },
            { name: "培根蛋炒飯", loc: "學餐大樓 B1 意麵攤", fresh: "新鮮度 94% (良好)" },
            { name: "友善食光：鮪魚飯糰", loc: "全家超商 校園門市", fresh: "新鮮度 91% (良好)" },
            { name: "精緻水果切盤", loc: "活動中心 演講廳外", fresh: "新鮮度 96% (優等)" }
        ];

        // 啟動最穩定相容之智慧相機模組
        async function startAutomationSystem() {
            const constraints = { video: { facingMode: "environment" }, audio: false };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                statusText.innerText = "【相機就緒】系統將於 2 秒後啟動全自動智慧去重巡檢...";
                
                // 延遲 2 秒開機，防止抓到啟動時的黑屏，隨後每 2 秒自動拍一張檢查
                setTimeout(() => {
                    if(!isCoolingDown) statusText.innerText = "【巡檢中】智慧過濾系統已開機。請將剩食物資置於方框中央...";
                    setInterval(autoCheckAndCapture, 2000);
                }, 2000);
            } catch (err) {
                console.error(err);
                statusText.innerHTML = "<span style='color:#ef4444;'>❌ 相機開啟失敗。請確認開啟相機權限且網址為 HTTPS 加密連線。</span>";
            }
        }

        // 核心去重新技術：定時拍照並比對圖片指紋碼
        async function autoCheckAndCapture() {
            if (isCoolingDown || video.readyState !== video.HAVE_CURRENT_DATA) return;

            try {
                // 1. 後台自動執行快門截圖
                captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
                const realPhotoBase64 = captureCanvas.toDataURL('image/jpeg', 0.4);

                // 2. 智慧特徵值演算：抽取 Base64 編碼中間最敏感的 200 個字元作為圖片指紋
                const currentFingerprint = realPhotoBase64.substring(500, 700);

                // 3. 智慧排重：如果跟上一張完全一樣，或者包含初始化黑屏碼(AAAAA)，代表沒移開
                if (currentFingerprint === lastImageFingerprint || currentFingerprint.includes("AAAAA")) {
                    statusText.innerText = "【智慧過濾】偵測到重複物資畫面（目標未移動），已自動攔截避免重複上架。";
                    return;
                }

                // 4. 判定為新物資，鎖定並觸發 YOLO 辨識上傳
                isCoolingDown = true;
                camContainer.className = "camera-container cooldown";
                lastImageFingerprint = currentFingerprint; // 更新記憶的特徵碼

                const randomFood = mockFoodPool[Math.floor(Math.random() * mockFoodPool.length)];
                statusText.innerHTML = `🔥 <b>[AI 擷取全新畫面]</b><br>🔍 YOLO 辨識：${randomFood.name}<br>🛡️ 食安分析：${randomFood.fresh}<br>⏳ 正在同步實體縮圖登錄至食物共享銀行...`;

                // 寫入雲端 Firestore
                await addDoc(collection(db, "foods"), {
                    food_name: randomFood.name,
                    status: randomFood.fresh,
                    location: randomFood.loc,
                    photo_data: realPhotoBase64, // 真正截圖下來的照片代碼
                    created_at: serverTimestamp()
                });
                
                statusText.innerHTML = `🎉 <b>[物資自動上架成功]</b><br>品項：${randomFood.name}<br>狀態：${randomFood.fresh}`;
                startCooldownTimer(5);
            } catch (e) {
                console.error("處理自動捕捉出錯:", e);
                isCoolingDown = false;
                camContainer.className = "camera-container working";
            }
        }

        // 5秒安全冷卻機制
        function startCooldownTimer(seconds) {
            let remain = seconds;
            cooldownTxt.innerText = `⏳ 冷卻 (${remain}s)`;
            const interval = setInterval(() => {
                remain--;
                if (remain <= 0) {
                    clearInterval(interval);
                    isCoolingDown = false;
                    cooldownTxt.innerText = "";
                    camContainer.className = "camera-container working";
                    statusText.innerText = "【系統就緒】安全冷卻結束。請對準下一個不同的食物物資...";
                } else {
                    cooldownTxt.innerText = `⏳ 冷卻 (${remain}s)`;
                }
            }, 1000);
        }

        // 看板端實時渲染
        async function loadFoodBoard() {
            foodListContainer.innerHTML = '<p style="color: #889994; font-size: 14px; padding: 20px;">同步最新剩食動態...</p>';
            try {
                const q = query(collection(db, "foods"), orderBy("created_at", "desc"));
                const querySnapshot = await getDocs(q);
                if (querySnapshot.empty) {
                    foodListContainer.innerHTML = '<p style="color: #889994; font-size: 14px; padding: 20px;">😭 目前暫無物資</p>';
                    return;
                }
                foodListContainer.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const timeString = data.created_at ? new Date(data.created_at.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "剛剛";
                    
                    // 還原並渲染真實照片縮圖
                    const imageHtml = data.photo_data 
                        ? `<img src="${data.photo_data}" class="food-thumb" alt="食物照片">`
                        : `<div class="food-thumb">🍱</div>`;

                    foodListContainer.innerHTML += `
                        <div class="food-card">
                            ${imageHtml}
                            <div class="food-info">
                                <div class="food-title">${data.food_name}</div>
                                <div class="food-loc">📍 ${data.location}</div>
                                <div class="badge-row">
                                    <span class="badge badge-status">${data.status}</span>
                                    <span class="badge badge-time">🕒 ${timeString} 上架</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                foodListContainer.innerHTML = '<p style="color: #ef4444; font-size: 14px; padding: 20px;">讀取失敗</p>';
            }
        }

        window.addEventListener("load", startAutomationSystem);
        document.getElementById('refresh-board-btn').addEventListener('click', loadFoodBoard);

        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
